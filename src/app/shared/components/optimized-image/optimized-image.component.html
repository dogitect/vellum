<div class="optimized-image">
  @if (useCloudflare) {
    <picture class="optimized-image__picture">
      <source type="image/avif" [srcset]="avifSrcset()" [sizes]="sizes()" />
      <source type="image/webp" [srcset]="webpSrcset()" [sizes]="sizes()" />
      <img
        [src]="fallbackSrc()"
        [alt]="alt()"
        [loading]="loading()"
        [attr.fetchpriority]="
          fetchpriority() !== 'auto' ? fetchpriority() : null
        "
        decoding="async"
        draggable="false"
      />
    </picture>
  } @else {
    <picture class="optimized-image__picture">
      <img
        [src]="src()"
        [alt]="alt()"
        [loading]="loading()"
        [attr.fetchpriority]="
          fetchpriority() !== 'auto' ? fetchpriority() : null
        "
        decoding="async"
        draggable="false"
      />
    </picture>
  }
</div>
